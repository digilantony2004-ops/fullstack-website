<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant | FoodieHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav class="navbar scrolled" id="navbar">
        <div class="container">
            <a href="../index.html" class="nav-logo"><i class="fas fa-fire"></i><span>FoodieHub</span></a>
            <div class="nav-links" id="nav-links">
                <a href="../index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="favorites.html">Favorites</a>
                <a href="cart.html">Cart</a>
                <a href="orders.html">Orders</a>
            </div>
            <div class="nav-actions">
                <a href="cart.html" class="nav-cart" id="nav-cart"><i class="fas fa-shopping-cart"></i><span class="cart-badge hidden" id="cart-badge">0</span></a>
                <div class="auth-buttons" id="auth-buttons"><a href="login.html" class="btn btn-secondary btn-sm">Login</a><a href="register.html" class="btn btn-primary btn-sm">Sign Up</a></div>
                <div class="user-dropdown" id="user-dropdown"><button class="user-dropdown-btn" id="user-dropdown-btn"><i class="fas fa-user-circle"></i><span id="user-name">User</span><i class="fas fa-chevron-down" style="font-size:0.7rem"></i></button><div class="user-dropdown-menu" id="user-dropdown-menu"><a href="orders.html"><i class="fas fa-receipt"></i> My Orders</a><a href="favorites.html"><i class="fas fa-heart"></i> Favorites</a><button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div>
                <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="restaurant-hero">
                <div class="restaurant-hero-bg" id="restaurant-hero-bg">
                    <img src="" alt="Restaurant" id="restaurant-image">
                </div>
                <div class="restaurant-info-card" id="restaurant-info">
                    <h1 id="restaurant-name">Loading...</h1>
                    <p id="restaurant-description" style="margin:var(--space-sm) 0 var(--space-md)"></p>
                    <div class="restaurant-meta" id="restaurant-meta">
                        <span><i class="fas fa-star"></i> <span id="restaurant-rating">-</span></span>
                        <span><i class="fas fa-clock"></i> <span id="restaurant-time">-</span></span>
                        <span><i class="fas fa-map-marker-alt"></i> <span id="restaurant-location">-</span></span>
                        <span><i class="fas fa-utensils"></i> <span id="restaurant-cuisine">-</span></span>
                    </div>
                </div>
            </div>

            <section>
                <h2 style="margin-bottom:var(--space-lg)">Menu</h2>
                <div class="filter-chips" id="restaurant-category-tabs">
                    <button class="filter-chip active" data-category="all">All Items</button>
                </div>
                <div class="food-grid" id="restaurant-foods-grid"></div>
            </section>

            <section>
                <h2 style="margin-bottom:var(--space-lg)">Reviews</h2>
                <div id="reviews-container">
                    <div class="empty-state"><i class="fas fa-comments"></i><h3>No reviews yet</h3><p>Be the first to review!</p></div>
                </div>
                <div id="review-form-container" style="margin-top:var(--space-lg);display:none">
                    <h4 style="margin-bottom:var(--space-md)">Write a Review</h4>
                    <div class="form-group">
                        <label>Rating</label>
                        <select id="review-rating" style="width:auto;padding:8px 16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text-primary)">
                            <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                            <option value="4">⭐⭐⭐⭐ Good</option>
                            <option value="3">⭐⭐⭐ Average</option>
                            <option value="2">⭐⭐ Poor</option>
                            <option value="1">⭐ Terrible</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Comment</label>
                        <textarea id="review-comment" rows="3" placeholder="Share your experience..." style="width:100%;padding:12px 16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text-primary);resize:vertical"></textarea>
                    </div>
                    <button class="btn btn-primary" id="submit-review-btn">Submit Review</button>
                </div>
            </section>
        </div>
    </main>

    <button class="back-to-top" id="back-to-top"><i class="fas fa-chevron-up"></i></button>
    <script src="../assests/js/app.js"></script>
    <script src="../assests/js/restaurant.js"></script>
</body>
</html>
