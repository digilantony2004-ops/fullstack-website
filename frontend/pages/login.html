<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FoodieHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-card-logo">
                <a href="../index.html" class="nav-logo"><i class="fas fa-fire"></i><span>FoodieHub</span></a>
            </div>
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to your account to continue ordering</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="you@example.com" required>
                    <div class="form-error" id="login-email-error"></div>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('login-password', this)"><i class="fas fa-eye"></i></button>
                    <div class="form-error" id="login-password-error"></div>
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-lg)">
                    <label style="display:flex;align-items:center;gap:var(--space-sm);font-size:0.85rem;color:var(--text-muted);cursor:pointer">
                        <input type="checkbox" id="remember-me" style="accent-color:var(--accent)"> Remember me
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Sign Up</a></p>
                <a href="../index.html" style="display:block;margin-top:var(--space-md);color:var(--text-muted);font-size:0.85rem"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script src="../assests/js/app.js"></script>
    <script src="../assests/js/auth.js"></script>
</body>
</html>
