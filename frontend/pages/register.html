<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | FoodieHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-card-logo">
                <a href="../index.html" class="nav-logo"><i class="fas fa-fire"></i><span>FoodieHub</span></a>
            </div>
            <h2>Create Account</h2>
            <p class="subtitle">Join FoodieHub and start ordering delicious food</p>

            <form id="register-form">
                <div class="form-group">
                    <label for="register-name">Full Name</label>
                    <input type="text" id="register-name" placeholder="John Doe" required>
                    <div class="form-error" id="register-name-error"></div>
                </div>
                <div class="form-group">
                    <label for="register-email">Email Address</label>
                    <input type="email" id="register-email" placeholder="you@example.com" required>
                    <div class="form-error" id="register-email-error"></div>
                </div>
                <div class="form-group">
                    <label for="register-phone">Phone Number</label>
                    <input type="tel" id="register-phone" placeholder="+91 98765 43210">
                    <div class="form-error" id="register-phone-error"></div>
                </div>
                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" placeholder="Min. 6 characters" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('register-password', this)"><i class="fas fa-eye"></i></button>
                    <div class="password-strength"><div class="password-strength-bar" id="password-strength-bar"></div></div>
                    <div class="form-error" id="register-password-error"></div>
                </div>
                <div class="form-group">
                    <label for="register-confirm">Confirm Password</label>
                    <input type="password" id="register-confirm" placeholder="Re-enter password" required>
                    <div class="form-error" id="register-confirm-error"></div>
                </div>
                <div style="margin-bottom:var(--space-lg)">
                    <label style="display:flex;align-items:flex-start;gap:var(--space-sm);font-size:0.85rem;color:var(--text-muted);cursor:pointer">
                        <input type="checkbox" id="agree-terms" style="accent-color:var(--accent);margin-top:3px" required>
                        I agree to the <a href="#" style="color:var(--accent)">Terms of Service</a> and <a href="#" style="color:var(--accent)">Privacy Policy</a>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%" id="register-btn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login</a></p>
                <a href="../index.html" style="display:block;margin-top:var(--space-md);color:var(--text-muted);font-size:0.85rem"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script src="../assests/js/app.js"></script>
    <script src="../assests/js/auth.js"></script>
</body>
</html>
